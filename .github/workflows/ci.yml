name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  test-and-build:
    name: Test and Verify Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: |
          backend/package-lock.json
          frontend/package-lock.json
          dashboard/package-lock.json

    - name: Install Backend Dependencies
      run: |
        cd backend
        npm ci

    - name: Test & Build Frontend
      env:
        CI: true
      run: |
        cd frontend
        npm ci
        npm test -- --watchAll=false
        CI=false npm run build

    - name: Test & Build Dashboard
      env:
        CI: true
      run: |
        cd dashboard
        npm ci
        npm test -- --watchAll=false
        CI=false npm run build

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Verify Docker Compose Build
      run: |
        docker compose build

    - name: Downcase repository name
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      run: |
        echo "REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

    - name: Log in to GitHub Container Registry
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and Push Backend Image
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: |
          ghcr.io/${{ env.REPO_LOWER }}/backend:latest
          ghcr.io/${{ env.REPO_LOWER }}/backend:${{ github.sha }}

    - name: Build and Push Frontend Image
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: true
        build-args: |
          REACT_APP_FIREBASE_API_KEY=AIzaSyCVFoms1s1LEMcWA5jMlfFf9fWZ-7c4o2U
          REACT_APP_FIREBASE_AUTH_DOMAIN=tradeflow-eafd5.firebaseapp.com
          REACT_APP_FIREBASE_PROJECT_ID=tradeflow-eafd5
          REACT_APP_FIREBASE_STORAGE_BUCKET=tradeflow-eafd5.firebasestorage.app
          REACT_APP_FIREBASE_MESSAGING_SENDER_ID=599516524392
          REACT_APP_FIREBASE_APP_ID=1:599516524392:web:8817d10a77e6edde9d30dd
        tags: |
          ghcr.io/${{ env.REPO_LOWER }}/frontend:latest
          ghcr.io/${{ env.REPO_LOWER }}/frontend:${{ github.sha }}

    - name: Build and Push Dashboard Image
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: docker/build-push-action@v5
      with:
        context: ./dashboard
        push: true
        tags: |
          ghcr.io/${{ env.REPO_LOWER }}/dashboard:latest
          ghcr.io/${{ env.REPO_LOWER }}/dashboard:${{ github.sha }}
